<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CyberBotAlarm – Live Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--card:#111116;--border:#27272a;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--orange:#f97316;--blue:#3b82f6;--text:#e4e4e7;--muted:#71717a}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Header */
header{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
header h1{font-size:1.1rem;font-weight:700;letter-spacing:-0.5px}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #22c55e55}50%{box-shadow:0 0 0 6px transparent}}
.ml-auto{margin-left:auto}
.chip{font-size:0.72rem;padding:3px 10px;border-radius:20px;border:1px solid;background:transparent}
.chip-green{border-color:var(--green);color:var(--green)}
.chip-red{border-color:var(--red);color:var(--red)}

/* Layout */
.layout{display:grid;grid-template-columns:1fr 340px;grid-template-rows:auto 1fr;gap:1px;flex:1;overflow:hidden;background:var(--border)}

/* Stats bar */
.stats{grid-column:1/-1;display:flex;gap:1px;background:var(--border)}
.stat{flex:1;background:var(--card);padding:14px 20px}
.stat .n{font-size:1.8rem;font-weight:800;line-height:1}
.stat .l{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.stat .n.green{color:var(--green)}.stat .n.red{color:var(--red)}.stat .n.yellow{color:var(--yellow)}.stat .n.blue{color:var(--blue)}

/* Map */
#map{background:var(--card);position:relative}
#map-container{height:100%;width:100%}

/* Side panel */
.side{background:var(--card);display:flex;flex-direction:column;overflow:hidden}
.panel-title{padding:12px 16px;font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);flex-shrink:0}

/* Event feed */
#feed{flex:1;overflow-y:auto;font-size:0.78rem}
#feed::-webkit-scrollbar{width:4px}
#feed::-webkit-scrollbar-track{background:transparent}
#feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ev{padding:10px 14px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:auto 1fr auto;gap:6px;align-items:start;transition:background 0.3s}
.ev:hover{background:#ffffff08}
.ev.new{animation:flash 1s ease-out}
@keyframes flash{from{background:#22c55e18}to{background:transparent}}
.ev-icon{font-size:1rem;line-height:1.2}
.ev-body{}
.ev-type{color:var(--text);font-weight:600;font-size:0.75rem}
.ev-ip{color:var(--blue);font-size:0.72rem;font-family:monospace}
.ev-meta{color:var(--muted);font-size:0.65rem;margin-top:2px}
.ev-time{color:var(--muted);font-size:0.65rem;white-space:nowrap}
.sev{display:inline-block;padding:1px 6px;border-radius:4px;font-size:0.62rem;font-weight:700}
.sev-critical{background:#7f1d1d;color:#fca5a5}
.sev-high{background:#7f1d1d55;color:var(--red);border:1px solid var(--red)}
.sev-medium{background:#f9730022;color:var(--orange);border:1px solid var(--orange)}
.sev-low{background:#f59e0b22;color:var(--yellow);border:1px solid var(--yellow)}

/* Attacker list */
#attackers{overflow-y:auto;max-height:220px;flex-shrink:0;border-top:1px solid var(--border)}
.att{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:0.75rem}
.att-ip{color:var(--blue);font-family:monospace}
.att-score{font-weight:700;font-size:0.8rem}
.score-critical{color:#fca5a5}
.score-high{color:var(--red)}
.score-medium{color:var(--orange)}
.score-low{color:var(--yellow)}

/* Map dark theme */
.leaflet-tile{filter:brightness(0.4) saturate(0.3) hue-rotate(200deg)}
.leaflet-container{background:#09090b}
</style>
</head>
<body>
<header>
  <div class="pulse"></div>
  <h1>🪤 CyberBotAlarm</h1>
  <span style="color:var(--muted);font-size:0.8rem">Honeypot Intelligence Dashboard</span>
  <div class="ml-auto" style="display:flex;gap:8px;align-items:center">
    <span class="chip chip-green" id="live-chip">● LIVE</span>
    <span style="font-size:0.75rem;color:var(--muted)" id="conn-status">Verbinde...</span>
  </div>
</header>

<div class="layout">
  <div class="stats">
    <div class="stat"><div class="n green" id="s-total">–</div><div class="l">Events</div></div>
    <div class="stat"><div class="n blue" id="s-attackers">–</div><div class="l">Angreifer</div></div>
    <div class="stat"><div class="n yellow" id="s-ssh">–</div><div class="l">SSH Sessions</div></div>
    <div class="stat"><div class="n orange" id="s-web">–</div><div class="l">Web Angriffe</div></div>
    <div class="stat"><div class="n red" id="s-high">–</div><div class="l">Kritisch</div></div>
  </div>

  <div id="map">
    <div id="map-container"></div>
  </div>

  <div class="side">
    <div class="panel-title">⚡ Live Event Feed</div>
    <div id="feed"></div>
    <div class="panel-title" style="border-top:1px solid var(--border)">🎯 Top Angreifer</div>
    <div id="attackers"></div>
  </div>
</div>

<script>
const ICONS = {
  ssh_login_attempt:"🔐", ssh_shell_command:"💻", ssh_dangerous_cmd:"☠️",
  ssh_malware_download:"🦠", web_admin_access:"🌐", web_sqli:"💉",
  web_xss:"⚠️", web_rce_attempt:"💣", web_fingerprint:"🔍",
  honeytoken_triggered:"🎯", mysql_auth:"🗄️", ftp_auth:"📁",
  redis_probe:"🔄", telnet_auth:"📟", port_scan:"🚨",
  web_sensitive_file:"🗝️", web_path_traversal:"📂", default:"🪤"
};

// Map setup
const map = L.map("map-container", {zoomControl:false, attributionControl:false}).setView([20,0], 2);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
const markers = [];

function addMapMarker(event) {
  const geo = event.geo || {};
  if (!geo.lat || !geo.lon) return;
  const color = {critical:"#7f1d1d",high:"#ef4444",medium:"#f97316",low:"#f59e0b"}[event.severity] || "#f59e0b";
  const marker = L.circleMarker([geo.lat, geo.lon], {
    radius: 8, fillColor: color, color: color,
    weight: 1, opacity: 0.9, fillOpacity: 0.6
  }).bindPopup(`<b>${event.event_type}</b><br>${event.ip}<br>${geo.city}, ${geo.country}<br>Score: ${event.threat_score}/100`);
  marker.addTo(map);
  markers.push(marker);
  if (markers.length > 200) map.removeLayer(markers.shift());
}

function addEvent(e) {
  const feed = document.getElementById("feed");
  const icon = ICONS[e.event_type] || ICONS.default;
  const sev  = e.severity || "low";
  const geo  = e.geo || {};
  const time = new Date(e.ts || Date.now()).toLocaleTimeString("de-DE");
  const loc  = geo.city ? `${geo.city}, ${geo.country}` : "";
  const extras = [
    e.username ? `👤 ${e.username}` : "",
    e.password ? `🔑 ${e.password}` : "",
    e.command  ? `💻 ${String(e.command).slice(0,60)}` : "",
    e.real_ips?.length ? `🎯 Real IP: ${e.real_ips.join(", ")}` : "",
    e.tools_detected?.length ? `🛠 ${e.tools_detected.join(", ")}` : "",
  ].filter(Boolean).join(" · ");

  const div = document.createElement("div");
  div.className = "ev new";
  div.innerHTML = `
    <span class="ev-icon">${icon}</span>
    <div class="ev-body">
      <div class="ev-type">${e.event_type.replace(/_/g," ")} <span class="sev sev-${sev}">${sev}</span></div>
      <div class="ev-ip">${e.ip || "?"} ${loc ? `· ${loc}` : ""} · Score: ${e.threat_score || 0}</div>
      ${extras ? `<div class="ev-meta">${extras}</div>` : ""}
    </div>
    <div class="ev-time">${time}</div>`;
  feed.prepend(div);
  if (feed.children.length > 500) feed.lastChild.remove();
  addMapMarker(e);
}

async function loadStats() {
  const r = await fetch("/api/stats");
  const s = await r.json();
  document.getElementById("s-total").textContent     = s.total_events    ?? "–";
  document.getElementById("s-attackers").textContent = s.unique_attackers ?? "–";
  document.getElementById("s-ssh").textContent       = s.ssh_sessions     ?? "–";
  document.getElementById("s-web").textContent       = s.web_hits         ?? "–";
  document.getElementById("s-high").textContent      = s.high_severity    ?? "–";
}

async function loadAttackers() {
  const r = await fetch("/api/attackers");
  const list = await r.json();
  const div = document.getElementById("attackers");
  div.innerHTML = list.slice(0,15).map(a => {
    const score = a.threat_score || 0;
    const cls = score>=76?"critical":score>=51?"high":score>=26?"medium":"low";
    const geo = a.geo || {};
    return `<div class="att">
      <div>
        <div class="att-ip">${a.ip}</div>
        <div style="color:var(--muted);font-size:0.65rem">${geo.city||"?"}, ${geo.country||"?"} · ${a.hit_count||1} hits</div>
      </div>
      <div class="att-score score-${cls}">${score}</div>
    </div>`;
  }).join("");
}

// WebSocket
let ws;
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => {
    document.getElementById("conn-status").textContent = "Verbunden";
    document.getElementById("live-chip").className = "chip chip-green";
    loadStats(); loadAttackers();
  };
  ws.onmessage = msg => {
    const d = JSON.parse(msg.data);
    if (d.type === "history") {
      d.events.forEach(addEvent);
    } else if (d.type === "event") {
      addEvent(d);
      loadStats();
      if (Math.random() < 0.3) loadAttackers();
    }
  };
  ws.onclose = () => {
    document.getElementById("conn-status").textContent = "Getrennt – verbinde...";
    document.getElementById("live-chip").className = "chip chip-red";
    setTimeout(connect, 3000);
  };
}
connect();
setInterval(loadStats, 10000);
setInterval(loadAttackers, 15000);
</script>
</body>
</html>
