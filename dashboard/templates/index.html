<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberBotAlarm – Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d0d; color: #00ff88; font-family: 'Courier New', monospace; }
  header { background: #111; border-bottom: 1px solid #00ff88; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.4rem; color: #00ff88; }
  header span { font-size: 0.8rem; color: #555; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00ff88; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 #00ff8844} 50%{box-shadow:0 0 0 8px #00ff8800} }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; padding: 24px; }
  .stat-card { background: #111; border: 1px solid #1a1a1a; border-radius: 8px; padding: 20px; text-align: center; }
  .stat-card .num { font-size: 2.5rem; font-weight: bold; color: #00ff88; }
  .stat-card .label { font-size: 0.75rem; color: #555; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

  .section { padding: 0 24px 24px; }
  .section h2 { color: #00ff88; font-size: 1rem; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; margin-bottom: 16px; letter-spacing: 2px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { background: #111; color: #555; padding: 10px 12px; text-align: left; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
  td { padding: 10px 12px; border-bottom: 1px solid #111; }
  tr:hover td { background: #111; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
  .badge-high { background: #ff000033; color: #ff4444; border: 1px solid #ff4444; }
  .badge-medium { background: #ff8c0033; color: #ff8c00; border: 1px solid #ff8c00; }
  .badge-low { background: #ffff0033; color: #ffff00; border: 1px solid #ffff00; }

  .event-type { color: #00aaff; }
  .ip { color: #ff88aa; }
  .new-row { animation: flash 1s ease-out; }
  @keyframes flash { from { background: #00ff8822; } to { background: transparent; } }

  #live-badge { background: #00ff8822; color: #00ff88; border: 1px solid #00ff88; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; margin-left: auto; }
</style>
</head>
<body>
<header>
  <div class="status-dot"></div>
  <h1>🪤 CyberBotAlarm</h1>
  <span>Honeypot Dashboard</span>
  <div id="live-badge">● LIVE</div>
</header>

<div class="stats" id="stats">
  <div class="stat-card"><div class="num" id="s-total">–</div><div class="label">Events gesamt</div></div>
  <div class="stat-card"><div class="num" id="s-ssh">–</div><div class="label">SSH Angriffe</div></div>
  <div class="stat-card"><div class="num" id="s-web">–</div><div class="label">Web Angriffe</div></div>
  <div class="stat-card"><div class="num" id="s-scan">–</div><div class="label">Port Scans</div></div>
  <div class="stat-card"><div class="num" id="s-ips">–</div><div class="label">Unique IPs</div></div>
</div>

<div class="section">
  <h2>⚡ Live Events</h2>
  <table>
    <thead><tr><th>Zeit</th><th>Typ</th><th>IP</th><th>Port</th><th>User</th><th>Pass</th><th>Severity</th></tr></thead>
    <tbody id="events-table"></tbody>
  </table>
</div>

<script>
const ws = new WebSocket(`ws://${location.host}/ws`);
const tbody = document.getElementById("events-table");

ws.onmessage = (msg) => {
  const e = JSON.parse(msg.data);
  if (e.type === "stats") { updateStats(e); return; }
  if (e.type === "history") { e.events.forEach(addRow); loadStats(); return; }
  addRow(e);
  loadStats();
};

function addRow(e) {
  const tr = document.createElement("tr");
  tr.className = "new-row";
  const sev = e.severity || "low";
  tr.innerHTML = `
    <td>${e.timestamp ? e.timestamp.replace("T"," ").slice(0,19) : new Date().toISOString().slice(0,19)}</td>
    <td class="event-type">${e.event_type || "?"}</td>
    <td class="ip">${e.ip || "?"}</td>
    <td>${e.port || "-"}</td>
    <td>${e.username || "-"}</td>
    <td>${e.password || "-"}</td>
    <td><span class="badge badge-${sev}">${sev.toUpperCase()}</span></td>
  `;
  tbody.prepend(tr);
  if (tbody.children.length > 200) tbody.lastChild.remove();
}

async function loadStats() {
  const r = await fetch("/api/stats");
  const s = await r.json();
  updateStats(s);
}

function updateStats(s) {
  document.getElementById("s-total").textContent = s.total ?? "–";
  document.getElementById("s-ssh").textContent = s.ssh_attacks ?? "–";
  document.getElementById("s-web").textContent = s.web_attacks ?? "–";
  document.getElementById("s-scan").textContent = s.port_scans ?? "–";
  document.getElementById("s-ips").textContent = s.unique_ips ?? "–";
}

loadStats();
</script>
</body>
</html>
