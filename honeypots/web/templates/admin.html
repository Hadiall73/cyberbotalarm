<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login – Server Management</title>
<script src="/fp/fp.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',Arial,sans-serif}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:40px;width:380px;box-shadow:0 25px 50px rgba(0,0,0,0.5)}
.logo{text-align:center;margin-bottom:32px}
.logo svg{width:48px;height:48px}
h2{color:#fff;font-size:1.4rem;text-align:center;margin-bottom:4px}
.subtitle{color:#888;font-size:0.8rem;text-align:center;margin-bottom:28px}
label{display:block;color:#aaa;font-size:0.8rem;margin-bottom:6px;margin-top:16px}
input{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px 16px;color:#fff;font-size:0.95rem;outline:none;transition:border 0.2s}
input:focus{border-color:#4f8ef7}
.btn{width:100%;margin-top:24px;padding:13px;background:linear-gradient(135deg,#4f8ef7,#7c3aed);border:none;border-radius:8px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity 0.2s}
.btn:hover{opacity:0.9}
.footer{text-align:center;margin-top:20px;color:#555;font-size:0.72rem}
.alert{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;border-radius:8px;padding:10px;margin-bottom:16px;font-size:0.85rem;display:{{alert_display}}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#4f8ef7" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <h2>Server Management</h2>
  <p class="subtitle">Production Dashboard v4.2.1</p>
  <div class="alert">{{alert_msg}}</div>
  <form method="POST" action="/admin/login">
    <label>Username</label>
    <input type="text" name="username" autocomplete="username" required placeholder="admin">
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password" required placeholder="••••••••">
    <button class="btn" type="submit">Sign In</button>
  </form>
  <div class="footer">© 2024 ServerAdmin Pro · Secure Connection</div>
</div>
</body>
</html>
